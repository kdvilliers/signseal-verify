name: Supabase keep-alive

on:
  schedule:
    - cron: "0 6 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://ndierlngpweqzizezuoa.supabase.co/rest/v1/remote_signing_requests?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase status: $STATUS"
          [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ] && echo "Project alive." || (echo "Unexpected status $STATUS" && exit 1)
