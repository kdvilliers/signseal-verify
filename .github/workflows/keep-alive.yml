name: Supabase keep-alive

on:
  schedule:
    - cron: "0 6 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ping Supabase with a real database query
        run: |
          # The anon key is public by design — it ships in sign.html on this
          # public Pages site. Reading it from the repo keeps one source of
          # truth and survives key rotation (sign.html must be updated anyway).
          KEY=$(grep -o 'ANON_KEY = "[^"]*"' sign.html | cut -d'"' -f2)
          if [ -z "$KEY" ]; then
            echo "ERROR: could not extract ANON_KEY from sign.html — update this workflow's grep."
            exit 1
          fi
          # A real RPC lookup (dummy id) = an actual database query, which is
          # unambiguous activity to Supabase's inactivity/pause detector.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --connect-timeout 15 --max-time 30 \
            -X POST "https://ndierlngpweqzizezuoa.supabase.co/rest/v1/rpc/get_signing_request" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY" \
            -H "Content-Type: application/json" \
            -d '{"p_request_id":"keepalive-ping"}') || STATUS="000"
          echo "Supabase HTTP status: $STATUS"
          case "$STATUS" in
            2*) echo "Database query serviced — project is active." ;;
            000) echo "ERROR: unreachable (DNS/timeout) — project is likely PAUSED. Restore: https://supabase.com/dashboard/project/ndierlngpweqzizezuoa"; exit 1 ;;
            *) echo "ERROR: unexpected status $STATUS — key mismatch or API change; investigate."; exit 1 ;;
          esac
